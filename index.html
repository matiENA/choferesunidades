<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Salidas | Sistema Flota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Oculta el scrollbar en la sub-barra de filtros para un diseño más limpio */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen flex flex-col font-sans">
    
    <header class="bg-slate-900 text-white shadow-md z-20 flex flex-col md:flex-row items-center justify-between px-6 py-3 border-b-4 border-indigo-600 font-sans">
        <div class="w-full md:w-1/3 flex justify-center md:justify-start items-center mb-3 md:mb-0">
            <h1 class="text-xl font-black tracking-widest text-white uppercase">SISTEMA FLOTA</h1>
        </div>
        <div class="w-full md:w-1/3 flex justify-center mb-3 md:mb-0">
            <nav class="flex gap-2 bg-slate-800 p-1.5 rounded-lg shadow-inner">
                <a href="index.html" class="px-4 py-2 bg-indigo-600 text-white text-sm font-bold rounded shadow-md flex items-center tracking-wider pointer-events-none transition duration-200">INICIA</a>
                <a href="gestion-diagramas.html" class="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center tracking-wider transition duration-200">GESTIÓN</a>
                <a href="taller.html" class="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center tracking-wider transition duration-200">TALLER</a>
            </nav>
        </div>
        <div class="w-full md:w-1/3 flex justify-center md:justify-end items-center gap-4">
            <span id="status-indicator" class="text-xs font-bold text-slate-400 tracking-widest uppercase hidden md:inline">Verificando...</span>
            <button onclick="cerrarSesion()" class="text-xs font-bold bg-slate-800 hover:bg-rose-600 border border-slate-700 hover:border-rose-600 px-3 py-1.5 rounded text-slate-300 hover:text-white transition duration-200 uppercase tracking-widest">
                Cerrar Sesión
            </button>
        </div>
    </header>

    <div class="bg-slate-800 border-b border-slate-700 px-6 py-2.5 flex items-center gap-3 overflow-x-auto hide-scrollbar shadow-inner">
        <button onclick="aplicarFiltro('TODOS')" id="btn-filtro-TODOS" class="filtro-btn bg-slate-700 text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-slate-600 transition shadow-sm whitespace-nowrap">
            TODOS
        </button>
        <button onclick="aplicarFiltro('LIVIANO')" id="btn-filtro-LIVIANO" class="filtro-btn bg-slate-900 text-slate-400 hover:text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-slate-800 hover:border-slate-600 transition flex items-center gap-2 whitespace-nowrap">
            <span class="w-2.5 h-2.5 rounded-full bg-[#10b981]"></span> LIVIANO
        </button>
        <button onclick="aplicarFiltro('CRUDO')" id="btn-filtro-CRUDO" class="filtro-btn bg-slate-900 text-slate-400 hover:text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-slate-800 hover:border-slate-600 transition flex items-center gap-2 whitespace-nowrap">
            <span class="w-2.5 h-2.5 rounded-full bg-[#8B4513]"></span> CRUDO
        </button>
        <button onclick="aplicarFiltro('METANOL')" id="btn-filtro-METANOL" class="filtro-btn bg-slate-900 text-slate-400 hover:text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-slate-800 hover:border-slate-600 transition flex items-center gap-2 whitespace-nowrap">
            <span class="w-2.5 h-2.5 rounded-full bg-[#3b82f6]"></span> METANOL
        </button>
        <button onclick="aplicarFiltro('ETANOL')" id="btn-filtro-ETANOL" class="filtro-btn bg-slate-900 text-slate-400 hover:text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-slate-800 hover:border-slate-600 transition flex items-center gap-2 whitespace-nowrap">
            <span class="w-2.5 h-2.5 rounded-full bg-[#f8fafc]"></span> ETANOL
        </button>
        <button onclick="aplicarFiltro('GASOIL')" id="btn-filtro-GASOIL" class="filtro-btn bg-slate-900 text-slate-400 hover:text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-slate-800 hover:border-slate-600 transition flex items-center gap-2 whitespace-nowrap">
            <span class="w-2.5 h-2.5 rounded-full bg-[#eab308]"></span> GASOIL
        </button>
    </div>

    <main class="flex-1 p-6 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-indigo-600 w-full max-w-md">
            <h2 class="text-2xl font-black text-slate-800 mb-6 tracking-wide text-center uppercase">Nueva Salida</h2>

            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 flex justify-between">
                        <span>Unidad (Tractor)</span>
                        <span id="contador-unidades" class="text-indigo-600 font-black"></span>
                    </label>
                    <select id="sel-unidad" class="w-full p-3 border border-slate-300 rounded bg-slate-50 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-inner">
                        <option value="">Cargando unidades...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Chofer Asignado</label>
                    <select id="sel-chofer" class="w-full p-3 border border-slate-300 rounded bg-slate-50 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-inner">
                        <option value="">Cargando choferes...</option>
                    </select>
                </div>

                <button id="btn-iniciar" onclick="confirmarSalida()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded shadow-md transition uppercase tracking-widest text-sm">
                    Iniciar Viaje
                </button>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div id="modal-box" class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 border-t-4 border-indigo-500">
            <h3 id="modal-title" class="text-xl font-black text-slate-800 tracking-wide mb-2 uppercase"></h3>
            <p id="modal-message" class="text-sm font-bold text-slate-500 mb-4"></p>
            
            <div id="modal-date-container" class="hidden mb-6">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Fecha a registrar en Excel</label>
                <input type="date" id="modal-date" class="w-full p-3 border border-slate-300 rounded bg-slate-50 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm font-medium text-slate-700 cursor-pointer">
            </div>

            <div class="flex justify-end gap-3">
                <button id="modal-btn-cancel" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded transition tracking-wider text-sm uppercase">Cancelar</button>
                <button id="modal-btn-confirm" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded shadow transition tracking-wider text-sm uppercase">Confirmar Salida</button>
            </div>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://laspqhmkrbmuxfgmnudf.supabase.co', 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d');
        let operadorActual = "";
        const URL_WEBHOOK_EXCEL = "AQUÍ_PEGA_TU_URL_DE_APPS_SCRIPT"; 

        // Variables Globales para los filtros
        let todasLasUnidades = [];
        let filtroActual = 'TODOS';

        // MOTOR DE MODAL
        function showModal({ title, message, type = 'alert' }) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('modal-overlay');
                const box = document.getElementById('modal-box');
                const btnCancel = document.getElementById('modal-btn-cancel');
                const btnConfirm = document.getElementById('modal-btn-confirm');
                const dateCont = document.getElementById('modal-date-container');
                const dateEl = document.getElementById('modal-date');

                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-message').innerText = message;

                dateCont.classList.add('hidden');
                
                if (type === 'alert') {
                    btnCancel.classList.add('hidden');
                } else {
                    btnCancel.classList.remove('hidden');
                }

                if (type === 'date') {
                    dateCont.classList.remove('hidden');
                    const hoy = new Date();
                    const yyyy = hoy.getFullYear();
                    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
                    const dd = String(hoy.getDate()).padStart(2, '0');
                    dateEl.value = `${yyyy}-${mm}-${dd}`;
                }

                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.classList.remove('opacity-0'); box.classList.replace('scale-95', 'scale-100'); }, 10);

                const closeModal = (result) => {
                    overlay.classList.add('opacity-0'); box.classList.replace('scale-100', 'scale-95');
                    setTimeout(() => { overlay.classList.add('hidden'); resolve(result); }, 300);
                };

                btnConfirm.onclick = () => {
                    if (type === 'date') {
                        if (!dateEl.value) {
                            dateEl.classList.add('border-rose-500');
                            return;
                        }
                        closeModal(dateEl.value);
                    } else {
                        closeModal(true);
                    }
                };
                btnCancel.onclick = () => closeModal(false);
            });
        }

        async function verificarSesion() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) window.location.href = 'login.html';
            else {
                operadorActual = session.user.email;
                document.getElementById('status-indicator').innerText = operadorActual;
                cargarFormulario();
            }
        }

        // LÓGICA DE FILTROS
        function aplicarFiltro(producto) {
            filtroActual = producto;

            // Reiniciar todos los botones visualmente
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('bg-slate-700', 'text-white', 'border-slate-600');
                btn.classList.add('bg-slate-900', 'text-slate-400', 'border-slate-800');
            });

            // Encender el botón seleccionado
            const btnActivo = document.getElementById(`btn-filtro-${producto}`);
            if(btnActivo) {
                btnActivo.classList.remove('bg-slate-900', 'text-slate-400', 'border-slate-800');
                btnActivo.classList.add('bg-slate-700', 'text-white', 'border-slate-600');
            }

            renderizarUnidades();
        }

        function renderizarUnidades() {
            const selUnidad = document.getElementById('sel-unidad');
            selUnidad.innerHTML = '<option value="">Seleccione una unidad...</option>';

            // Filtrar el array guardado en memoria
            const filtradas = filtroActual === 'TODOS' 
                ? todasLasUnidades 
                : todasLasUnidades.filter(u => u.producto === filtroActual);

            filtradas.forEach(u => {
                selUnidad.innerHTML += `<option value="${u.id}">${u.tractor}</option>`;
            });

            // Actualizar el contador visual para ayudar al operador
            document.getElementById('contador-unidades').innerText = `(${filtradas.length})`;
        }

        async function cargarFormulario() {
            // Traemos las unidades y guardamos el resultado en memoria para filtrar rápido
            const { data: unidades } = await db.from('units').select('id, tractor, producto').eq('estado', 'disponible').order('tractor');
            todasLasUnidades = unidades || [];
            
            // Renderizamos aplicando el filtro que esté seleccionado
            renderizarUnidades();

            const { data: choferes } = await db.from('choferes').select('id, nombre').order('nombre');
            const selChofer = document.getElementById('sel-chofer');
            selChofer.innerHTML = '<option value="">Seleccione un chofer...</option>';
            choferes?.forEach(c => selChofer.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
        }

        async function confirmarSalida() {
            const selUnidad = document.getElementById('sel-unidad');
            const selChofer = document.getElementById('sel-chofer');

            if (!selUnidad.value || !selChofer.value) {
                return showModal({title: 'Datos Incompletos', message: 'Debe seleccionar tanto la unidad como el chofer para iniciar el viaje.', type: 'alert'});
            }

            const fechaSeleccionada = await showModal({
                title: 'Confirmar Asignación',
                message: 'Verifique la fecha en la que este movimiento debe impactar en el Excel.',
                type: 'date'
            });

            if (!fechaSeleccionada) return; 

            const tractorTexto = selUnidad.options[selUnidad.selectedIndex].text;
            const choferTexto = selChofer.options[selChofer.selectedIndex].text;

            const partes = fechaSeleccionada.split('-');
            const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
            const fechaExcel = `${partes[2]} ${meses[parseInt(partes[1], 10) - 1]} ${partes[0]}`;

            const fechaDB = new Date();
            fechaDB.setFullYear(partes[0], parseInt(partes[1], 10) - 1, partes[2]);

            document.getElementById('btn-iniciar').innerText = "GUARDANDO...";
            document.getElementById('btn-iniciar').classList.add('opacity-50', 'pointer-events-none');

            await db.from('movimientos').insert([{
                id_unidad: selUnidad.value,
                id_chofer: selChofer.value,
                operador: operadorActual,
                fecha_inicio: fechaDB.toISOString()
            }]);

            await db.from('units').update({ estado: 'circulando', fecha_cambio_estado: new Date().toISOString() }).eq('id', selUnidad.value);

            if (URL_WEBHOOK_EXCEL !== "AQUÍ_PEGA_TU_URL_DE_APPS_SCRIPT") {
                try {
                    await fetch(URL_WEBHOOK_EXCEL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            tractor: tractorTexto,
                            chofer: choferTexto,
                            fecha: fechaExcel
                        })
                    });
                } catch (e) {
                    console.error("Fallo la inyección en Excel", e);
                }
            }

            location.reload();
        }

        async function cerrarSesion() { await db.auth.signOut(); window.location.href = 'login.html'; }
        
        verificarSesion();

        // Suscripción Realtime para actualizar la lista de unidades en vivo
        db.channel('cambios-index')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'units' }, () => {
                cargarFormulario();
            }).subscribe();
    </script>
</body>
</html>
