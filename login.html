<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema | Flota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-indigo-600">
        <h1 class="text-3xl font-black tracking-widest text-slate-800 text-center mb-2">SISTEMA FLOTA</h1>
        <p class="text-center text-slate-500 font-bold text-sm mb-8 uppercase tracking-widest">Acceso Restringido</p>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wide">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition bg-slate-50">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1 uppercase tracking-wide">Contraseña</label>
                <input type="password" id="password" required class="w-full p-3 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition bg-slate-50">
            </div>

            <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 rounded shadow transition uppercase tracking-widest">
                Ingresar al Sistema
            </button>
            <p id="error-msg" class="text-red-600 text-sm font-bold text-center hidden"></p>
        </form>
    </div>

    <script>
        const db = supabase.createClient('https://laspqhmkrbmuxfgmnudf.supabase.co', 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d');

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerText = "VERIFICANDO...";
            errorMsg.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Supabase verifica si el usuario existe y la contraseña es correcta
            const { data, error } = await db.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.innerText = "Acceso denegado: Credenciales incorrectas.";
                errorMsg.classList.remove('hidden');
                btn.innerText = "INGRESAR AL SISTEMA";
            } else {
                // Si es correcto, lo enviamos al panel de Salidas
                window.location.href = 'Index.html';
            }
        });
    </script>
</body>
</html>
