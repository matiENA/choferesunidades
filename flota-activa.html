<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Flota | En Ruta y Tránsito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-200 min-h-screen flex flex-col font-sans">

    <header class="bg-slate-900 text-white shadow-md z-10 flex flex-col md:flex-row justify-between items-center px-6 py-3 border-b-4 border-blue-500">
        
        <div class="flex items-center gap-4 mb-3 md:mb-0">
            <h1 class="text-xl font-black tracking-widest text-white">SISTEMA FLOTA</h1>
            <span class="bg-slate-700 text-slate-300 text-xs font-bold px-2 py-1 rounded uppercase tracking-wide">Vista de Lectura</span>
        </div>

        <nav class="flex gap-2 bg-slate-800 p-1.5 rounded-lg shadow-inner">
            <a href="Index.html" class="px-5 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center gap-2 transition">
                🚀 Operaciones
            </a>
            <a href="flota-activa.html" class="px-5 py-2 bg-blue-600 text-white text-sm font-bold rounded shadow-sm flex items-center gap-2 pointer-events-none">
                📊 Monitor en Ruta
            </a>
        </nav>

        <div class="mt-3 md:mt-0 flex items-center gap-3">
            <button onclick="cargarMonitor()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-sm font-bold transition flex items-center gap-2">
                🔄 Actualizar
            </button>
            <div id="status-indicator" class="text-sm font-bold bg-slate-800 px-3 py-1.5 rounded text-slate-300 border border-slate-700">Conectando...</div>
        </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div class="flex gap-4">
                    <div class="px-4 py-2 border-l-4 border-blue-500 bg-slate-50 rounded-r">
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Circulando</p>
                        <p class="text-2xl font-black text-slate-800" id="count-circulando">-</p>
                    </div>
                    <div class="px-4 py-2 border-l-4 border-orange-500 bg-slate-50 rounded-r">
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">En Tránsito / Taller</p>
                        <p class="text-2xl font-black text-slate-800" id="count-transito">-</p>
                    </div>
                </div>
                
                <input type="text" id="searchMonitor" placeholder="Filtrar patente o chofer..." class="w-full md:w-72 p-2 text-sm border rounded bg-white focus:ring-2 focus:ring-blue-500 outline-none transition" onkeyup="filtrarMonitor()">
            </div>

            <section class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
                <div class="p-3 bg-slate-800 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-white uppercase tracking-wide flex items-center gap-2">
                        🔵 EQUIPOS CIRCULANDO
                    </h2>
                </div>
                <div class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="contenedor-circulando">
                    </div>
            </section>

            <section class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
                <div class="p-3 bg-orange-100 border-b border-orange-200 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-orange-900 uppercase tracking-wide flex items-center gap-2">
                        🟠 EN TRÁNSITO / REPARACIÓN
                    </h2>
                </div>
                <div class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="contenedor-transito">
                    </div>
            </section>

        </div>
    </main>

    <script>
        // CONFIGURACIÓN BD
        const SUPABASE_URL = 'https://laspqhmkrbmuxfgmnudf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function formatearFecha(fechaIso) {
            const fecha = new Date(fechaIso);
            return fecha.toLocaleString('es-AR', { day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' });
        }

        async function cargarMonitor() {
            document.getElementById('status-indicator').innerText = 'Actualizando...';
            document.getElementById('status-indicator').className = 'text-sm font-bold bg-amber-500 px-3 py-1 rounded text-white';

            const { data: movimientos, error } = await db
                .from('movimientos')
                .select(`
                    fecha_hora,
                    tipo_operacion,
                    id_unidad,
                    id_chofer,
                    units ( tractor, estado ),
                    choferes ( nombre, estado )
                `)
                .order('fecha_hora', { ascending: false });

            if (error) {
                console.error("Error al cargar datos:", error);
                document.getElementById('status-indicator').innerText = 'Error de lectura';
                document.getElementById('status-indicator').className = 'text-sm font-bold bg-red-600 px-3 py-1 rounded text-white';
                return;
            }

            // Separar en dos grupos lógicos
            const circulando = [];
            const enTransito = [];
            const unidadesProcesadas = new Set(); 

            movimientos.forEach(mov => {
                if (!unidadesProcesadas.has(mov.id_unidad)) {
                    unidadesProcesadas.add(mov.id_unidad);
                    
                    const estadoUnidad = mov.units?.estado?.toLowerCase() || '';

                    // Lógica para Circulando
                    if (['inicia_diagrama', 'cambio_unidad_transito'].includes(mov.tipo_operacion) && 
                        (estadoUnidad === 'circulando' || estadoUnidad === 'activo')) {
                        circulando.push(mov);
                    }
                    // Lógica para Tránsito / Taller
                    else if (mov.tipo_operacion === 'transito' && 
                            (estadoUnidad === 'reparacion en transito' || estadoUnidad === 'reparacion')) {
                        enTransito.push(mov);
                    }
                }
            });

            // Actualizar Contadores
            document.getElementById('count-circulando').innerText = circulando.length;
            document.getElementById('count-transito').innerText = enTransito.length;

            // RENDERIZAR CIRCULANDO
            const contCirculando = document.getElementById('contenedor-circulando');
            contCirculando.innerHTML = '';
            if (circulando.length === 0) {
                contCirculando.innerHTML = '<p class="text-slate-500 text-sm p-4 col-span-full">No hay unidades en ruta.</p>';
            } else {
                circulando.forEach(eq => contCirculando.innerHTML += generarTarjeta(eq, 'circulando'));
            }

            // RENDERIZAR TRÁNSITO
            const contTransito = document.getElementById('contenedor-transito');
            contTransito.innerHTML = '';
            if (enTransito.length === 0) {
                contTransito.innerHTML = '<p class="text-slate-500 text-sm p-4 col-span-full">No hay unidades reportadas en tránsito o taller.</p>';
            } else {
                enTransito.forEach(eq => contTransito.innerHTML += generarTarjeta(eq, 'transito'));
            }

            document.getElementById('status-indicator').innerText = 'Actualizado';
            document.getElementById('status-indicator').className = 'text-sm font-bold bg-emerald-600 px-3 py-1 rounded text-white';
        }

        // Función constructora de HTML para no repetir código
        function generarTarjeta(eq, tipo) {
            const patente = eq.units?.tractor || 'Desconocido';
            const chofer = eq.choferes?.nombre || 'Desconocido';
            const estadoChofer = eq.choferes?.estado || '';
            const fecha = formatearFecha(eq.fecha_hora);
            
            // Lógica visual dependiendo si es Circulando o Tránsito
            const isCirculando = tipo === 'circulando';
            const colorBarra = isCirculando ? 'bg-blue-500' : 'bg-orange-500';
            const badgeClase = isCirculando ? 'bg-blue-100 text-blue-800 border-blue-200' : 'bg-orange-100 text-orange-800 border-orange-200';
            const badgeTexto = isCirculando ? 'En Ruta' : 'Taller / Tránsito';
            const iconoOperacion = isCirculando ? (eq.tipo_operacion === 'cambio_unidad_transito' ? '🔄 CAMBIO UNIDAD' : '🟢 INICIO') : '🟠 TRÁNSITO';

            // Alerta visual si el chofer ya fue reasignado a otra unidad
            let avisoChofer = '';
            if (!isCirculando && estadoChofer.toLowerCase() === 'activo') {
                avisoChofer = '<span class="block text-xs text-emerald-600 font-bold mt-1">⚠️ Chofer ya reasignado a otro equipo</span>';
            }

            return `
                <div class="monitor-card bg-white border border-slate-200 rounded-lg p-4 shadow-sm hover:shadow-md transition relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${colorBarra}"></div>
                    
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Unidad</p>
                            <h3 class="text-xl font-black text-slate-800 tarjeta-texto">${patente}</h3>
                        </div>
                        <span class="text-xs font-bold px-2 py-1 rounded border uppercase ${badgeClase}">${badgeTexto}</span>
                    </div>

                    <div class="mb-3">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Chofer que reportó</p>
                        <p class="text-base font-bold text-slate-700 tarjeta-texto">🧑‍✈️ ${chofer}</p>
                        ${avisoChofer}
                    </div>

                    <div class="bg-slate-50 p-2 rounded border border-slate-100 mt-4">
                        <div class="flex justify-between items-center text-xs text-slate-500 font-medium">
                            <span>${iconoOperacion}</span>
                            <span>🕒 ${fecha}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Buscador global (Filtra en ambas listas a la vez)
        function filtrarMonitor() {
            const filtro = document.getElementById('searchMonitor').value.toLowerCase();
            const tarjetas = document.getElementsByClassName('monitor-card');

            for (let i = 0; i < tarjetas.length; i++) {
                let textos = tarjetas[i].querySelectorAll('.tarjeta-texto');
                let contenido = Array.from(textos).map(t => t.innerText.toLowerCase()).join(' ');
                
                if (contenido.includes(filtro)) {
                    tarjetas[i].style.display = "";
                } else {
                    tarjetas[i].style.display = "none";
                }
            }
        }

        cargarMonitor();
        setInterval(cargarMonitor, 60000); 
    </script>
</body>
</html>
