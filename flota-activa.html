<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Flota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-200 min-h-screen flex flex-col font-sans">
    <header class="bg-slate-900 text-white shadow-md z-10 flex justify-between items-center px-6 py-3 border-b-4 border-blue-500">
        <h1 class="text-xl font-black tracking-widest text-white">SISTEMA FLOTA <span class="text-xs bg-slate-700 px-2 py-1 rounded ml-2">LECTURA</span></h1>
        <nav class="flex gap-2 bg-slate-800 p-1.5 rounded-lg">
            <a href="Index.html" class="px-4 py-2 text-slate-400 hover:text-white text-sm font-bold">🚀 Iniciar Salida</a>
            <a href="gestion-diagramas.html" class="px-4 py-2 text-slate-400 hover:text-white text-sm font-bold">🛣️ Gestión en Ruta</a>
            <a href="flota-activa.html" class="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded">📊 Monitor</a>
        </nav>
    </header>

    <main class="flex-1 p-6">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="contenedor-monitor"></div>
    </main>

    <script>
        const db = supabase.createClient('https://laspqhmkrbmuxfgmnudf.supabase.co', 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d');

        async function cargarMonitor() {
            // Ya no buscamos agrupaciones raras, simplemente pedimos los diagramas que el sistema sabe que están abiertos
            const { data: activos } = await db.from('movimientos')
                .select('fecha_inicio, units(tractor, estado), choferes(nombre)')
                .eq('estado_diagrama', 'abierto')
                .order('fecha_inicio', { ascending: false });

            const cont = document.getElementById('contenedor-monitor');
            cont.innerHTML = '';

            activos?.forEach(mov => {
                const isRuta = (mov.units?.estado === 'circulando');
                const color = isRuta ? 'bg-blue-500' : 'bg-orange-500';
                const badge = isRuta ? 'EN RUTA' : 'TALLER / TRÁNSITO';

                cont.innerHTML += `
                    <div class="bg-white border rounded-lg p-5 shadow relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1.5 ${color}"></div>
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-2xl font-black text-slate-800 pl-2">${mov.units?.tractor}</h3>
                            <span class="text-[10px] font-bold px-2 py-1 rounded border uppercase ${isRuta ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-orange-50 text-orange-700 border-orange-200'}">${badge}</span>
                        </div>
                        <p class="font-bold text-slate-600 pl-2">🧑‍✈️ ${mov.choferes?.nombre}</p>
                        <p class="text-xs text-slate-400 pl-2 mt-4 border-t pt-2">Salida: ${new Date(mov.fecha_inicio).toLocaleDateString()} - ${new Date(mov.fecha_inicio).toLocaleTimeString()}</p>
                    </div>
                `;
            });
        }

        cargarMonitor();
        setInterval(cargarMonitor, 10000); // Se actualiza solo cada 10 seg
    </script>
</body>
</html>
