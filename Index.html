<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torre de Control | Despacho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos para el scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-200 h-screen flex flex-col overflow-hidden font-sans">

    <header class="bg-slate-900 text-white p-4 shadow-md z-10 flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-wider">PANEL DE CONTROL OPERATIVO</h1>
        <div id="status-indicator" class="text-sm font-bold bg-slate-800 px-3 py-1 rounded text-slate-300">Sincronizando...</div>
    </header>

    <main class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 p-4 overflow-hidden">
        
        <section class="bg-white rounded-xl shadow flex flex-col overflow-hidden border-t-4 border-slate-700">
            <div class="p-4 border-b bg-slate-50">
                <h2 class="text-lg font-bold text-slate-800 mb-2 flex items-center">🚛 Unidades (Tractores)</h2>
                <input type="text" id="searchUnidades" placeholder="Buscar patente..." class="w-full p-2 border rounded bg-white focus:ring-2 focus:ring-slate-500 outline-none transition" onkeyup="filtrarLista('unidades')">
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-100" id="contenedor-unidades"></div>
        </section>

        <section class="bg-white rounded-xl shadow flex flex-col overflow-hidden border-t-4 border-slate-700">
            <div class="p-4 border-b bg-slate-50">
                <h2 class="text-lg font-bold text-slate-800 mb-2 flex items-center">🧑‍✈️ Personal (Choferes)</h2>
                <input type="text" id="searchChoferes" placeholder="Buscar nombre..." class="w-full p-2 border rounded bg-white focus:ring-2 focus:ring-slate-500 outline-none transition" onkeyup="filtrarLista('choferes')">
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-100" id="contenedor-choferes"></div>
        </section>

    </main>

    <footer class="bg-white border-t p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-10">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-3 text-sm font-bold text-slate-500 uppercase tracking-widest" id="accion-feedback">
                Selecciona 1 Unidad y 1 Chofer para habilitar las acciones
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <button onclick="registrarOperacion('inicia_diagrama')" id="btn-inicia" disabled class="btn-operacion disabled:opacity-40 disabled:cursor-not-allowed bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition shadow-md">
                    🟢 INICIA DIAGRAMA
                </button>
                <button onclick="registrarOperacion('termina_diagrama')" id="btn-termina" disabled class="btn-operacion disabled:opacity-40 disabled:cursor-not-allowed bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-lg transition shadow-md">
                    🔴 TERMINA DIAGRAMA
                </button>
                <button onclick="registrarOperacion('transito')" id="btn-transito" disabled class="btn-operacion disabled:opacity-40 disabled:cursor-not-allowed bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition shadow-md">
                    🟠 PASA A TRÁNSITO
                </button>
                <button onclick="registrarOperacion('cambio_unidad_transito')" id="btn-cambio" disabled class="btn-operacion disabled:opacity-40 disabled:cursor-not-allowed bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-md">
                    🔄 CAMBIO UNIDAD
                </button>
            </div>
        </div>
    </footer>

    <script>
        // 1. CONFIGURACIÓN BD
        const SUPABASE_URL = 'https://laspqhmkrbmuxfgmnudf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let state = {
            unidadSeleccionada: null,
            choferSeleccionado: null
        };

        // 2. RENDERIZADO
        function crearTarjeta(item, tipo) {
            const isUnidad = tipo === 'unidad';
            const titulo = isUnidad ? item.tractor : item.nombre;
            const estado = item.estado || 'sin_estado';
            
            let colorBadge = "bg-gray-200 text-gray-800";
            if (estado.toLowerCase() === 'disponible') colorBadge = "bg-emerald-100 text-emerald-800 border-emerald-300";
            if (estado.toLowerCase() === 'inactivo') colorBadge = "bg-slate-200 text-slate-700 border-slate-300";
            if (['circulando', 'activo'].includes(estado.toLowerCase())) colorBadge = "bg-blue-100 text-blue-800 border-blue-300";
            if (['reparacion en transito', 'transito en base'].includes(estado.toLowerCase())) colorBadge = "bg-orange-100 text-orange-800 border-orange-300";

            return `
                <div id="${tipo}-${item.id}" 
                     onclick="seleccionarTarjeta('${tipo}', '${item.id}', '${estado}')"
                     class="tarjeta-${tipo} search-item cursor-pointer bg-white border-2 border-transparent p-3 rounded-lg shadow-sm hover:shadow-md transition flex justify-between items-center group">
                    <span class="font-bold text-slate-700 text-lg item-text">${titulo}</span>
                    <span class="text-xs font-bold px-2 py-1 rounded border uppercase tracking-wider ${colorBadge}">${estado}</span>
                </div>
            `;
        }

        async function cargarDatos() {
            document.getElementById('status-indicator').innerText = 'Sincronizando...';
            document.getElementById('status-indicator').className = 'text-sm font-bold bg-amber-500 px-3 py-1 rounded text-white';

            const { data: units } = await db.from('units').select('id, tractor, estado').order('tractor');
            const contUnidades = document.getElementById('contenedor-unidades');
            contUnidades.innerHTML = '';
            if (units) units.forEach(u => contUnidades.innerHTML += crearTarjeta(u, 'unidad'));

            const { data: choferes } = await db.from('choferes').select('id, nombre, estado').order('nombre');
            const contChoferes = document.getElementById('contenedor-choferes');
            contChoferes.innerHTML = '';
            if (choferes) choferes.forEach(c => contChoferes.innerHTML += crearTarjeta(c, 'chofer'));

            state.unidadSeleccionada = null;
            state.choferSeleccionado = null;
            evaluarReglasLibres();

            document.getElementById('status-indicator').innerText = 'Actualizado';
            document.getElementById('status-indicator').className = 'text-sm font-bold bg-emerald-600 px-3 py-1 rounded text-white';
            
            filtrarLista('unidades');
            filtrarLista('choferes');
        }

        function seleccionarTarjeta(tipo, id, estadoDb) {
            document.querySelectorAll(`.tarjeta-${tipo}`).forEach(el => {
                el.classList.remove('border-indigo-600', 'ring-4', 'ring-indigo-100', 'bg-indigo-50');
                el.classList.add('border-transparent', 'bg-white');
            });

            const tarjeta = document.getElementById(`${tipo}-${id}`);
            tarjeta.classList.remove('border-transparent', 'bg-white');
            tarjeta.classList.add('border-indigo-600', 'ring-4', 'ring-indigo-100', 'bg-indigo-50');

            if (tipo === 'unidad') state.unidadSeleccionada = { id, estado: estadoDb };
            if (tipo === 'chofer') state.choferSeleccionado = { id, estado: estadoDb };

            evaluarReglasLibres();
        }

        // 4. MOTOR LIBRE (Sin validaciones estrictas)
        function evaluarReglasLibres() {
            const botones = ['btn-inicia', 'btn-termina', 'btn-transito', 'btn-cambio'];
            const feedback = document.getElementById('accion-feedback');

            // Si falta seleccionar alguno de los dos, se bloquea todo
            if (!state.unidadSeleccionada || !state.choferSeleccionado) {
                botones.forEach(id => document.getElementById(id).disabled = true);
                feedback.innerText = "Selecciona 1 Unidad y 1 Chofer para habilitar las acciones";
                feedback.className = "text-center mb-3 text-sm font-bold text-slate-500 uppercase tracking-widest";
                return;
            }

            // Si hay un chofer y una unidad seleccionados, se habilitan TODAS las acciones
            botones.forEach(id => document.getElementById(id).disabled = false);
            
            const eUnidad = state.unidadSeleccionada.estado;
            const eChofer = state.choferSeleccionado.estado;
            
            feedback.innerText = `[MODO LIBRE] UNIDAD: ${eUnidad.toUpperCase()} | CHOFER: ${eChofer.toUpperCase()} - Elige la acción a registrar:`;
            feedback.className = "text-center mb-3 text-sm font-bold text-indigo-600 uppercase tracking-widest";
        }

        async function registrarOperacion(tipo_operacion) {
            document.getElementById('status-indicator').innerText = 'Guardando...';
            
            const payload = {
                tipo_operacion: tipo_operacion,
                id_unidad: state.unidadSeleccionada.id,
                id_chofer: state.choferSeleccionado.id
            };

            const { error } = await db.from('movimientos').insert([payload]);

            if (error) {
                alert(`Error al registrar: ${error.message}`);
                document.getElementById('status-indicator').innerText = 'Error';
            } else {
                document.getElementById('searchUnidades').value = '';
                document.getElementById('searchChoferes').value = '';
                cargarDatos();
            }
        }

        function filtrarLista(tipoLista) {
            const inputId = tipoLista === 'unidades' ? 'searchUnidades' : 'searchChoferes';
            const contenedorId = tipoLista === 'unidades' ? 'contenedor-unidades' : 'contenedor-choferes';
            const filtro = document.getElementById(inputId).value.toLowerCase();
            const tarjetas = document.getElementById(contenedorId).getElementsByClassName('search-item');

            for (let i = 0; i < tarjetas.length; i++) {
                let texto = tarjetas[i].querySelector('.item-text').innerText.toLowerCase();
                if (texto.includes(filtro)) {
                    tarjetas[i].style.display = "";
                } else {
                    tarjetas[i].style.display = "none";
                }
            }
        }

        cargarDatos();
    </script>
</body>
</html>
