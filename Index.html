<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho | Iniciar Diagrama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos para embellecer el scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-200 h-screen flex flex-col font-sans overflow-hidden">
    <header class="bg-slate-900 text-white shadow-md z-10 flex justify-between items-center px-6 py-3 border-b-4 border-indigo-600">
        <h1 class="text-xl font-black tracking-widest text-white">SISTEMA FLOTA</h1>
        <nav class="flex gap-2 bg-slate-800 p-1.5 rounded-lg">
            <a href="Index.html" class="px-4 py-2 bg-indigo-600 text-white text-sm font-bold rounded">🚀 Iniciar Salida</a>
            <a href="gestion-diagramas.html" class="px-4 py-2 text-slate-400 hover:text-white text-sm font-bold">🛣️ Gestión en Ruta</a>
            <a href="flota-activa.html" class="px-4 py-2 text-slate-400 hover:text-white text-sm font-bold">📊 Monitor</a>
        </nav>
        <span id="status-indicator" class="text-sm font-bold bg-slate-800 px-3 py-1.5 rounded text-slate-300">Conectado</span>
    </header>

    <main class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 p-4 min-h-0">
        <section class="bg-white rounded-xl shadow flex flex-col border-t-4 border-slate-700 min-h-0 overflow-hidden">
            <div class="p-4 border-b bg-slate-50">
                <h2 class="text-lg font-bold mb-2">🚛 Unidades Disponibles</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="contenedor-unidades"></div>
        </section>

        <section class="bg-white rounded-xl shadow flex flex-col border-t-4 border-slate-700 min-h-0 overflow-hidden">
            <div class="p-4 border-b bg-slate-50">
                <h2 class="text-lg font-bold mb-2">🧑‍✈️ Personal Inactivo</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-4" id="contenedor-choferes"></div>
        </section>
    </main>

    <footer class="bg-white border-t p-4 shadow z-10">
        <div class="max-w-xl mx-auto">
            <button onclick="registrarSalida()" id="btn-inicia" disabled class="w-full disabled:opacity-40 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-md text-lg">
                🟢 REGISTRAR NUEVA SALIDA A RUTA
            </button>
        </div>
    </footer>

    <script>
        const db = supabase.createClient('https://laspqhmkrbmuxfgmnudf.supabase.co', 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d');
        let state = { unidad: null, chofer: null };

        async function cargarDatos() {
            // 1. Cambiamos el select() por un asterisco (*) para traer todas las columnas de fechas
            const { data: units } = await db.from('units').select('*').eq('estado', 'disponible');
            const contU = document.getElementById('contenedor-unidades');
            contU.innerHTML = '';
            
            units?.forEach(u => {
                // -- LÓGICA DE VENCIMIENTOS --
                let estadoVencimiento = 'ok';
                const hoy = new Date();
                const limiteMes = new Date();
                limiteMes.setMonth(hoy.getMonth() + 1); // Exactamente 1 mes hacia adelante
                
                // Lista de columnas que contienen fechas (Ajustá los nombres si tenés más o menos)
                const columnasFechas = ['vtv_tr', 'mas_tr', 'vtv_semi', 'mas_semi', 'esp_es', 'vi', 've'];
                
                for (let col of columnasFechas) {
                    if (u[col]) {
                        const fecha = new Date(u[col]);
                        if (fecha < hoy) {
                            estadoVencimiento = 'vencido';
                            break; // Si encontramos tan solo UN documento vencido, cortamos y queda ROJO
                        } else if (fecha <= limiteMes) {
                            estadoVencimiento = 'alerta'; // Si está por vencer, queda en AMARILLO (pero sigue buscando por si otro está vencido)
                        }
                    }
                }

                // -- ARMADO DE UI (BADGES) --
                let badgeVencimiento = '';
                if (estadoVencimiento === 'vencido') {
                    badgeVencimiento = '<span class="bg-red-100 text-red-700 border border-red-300 text-[10px] px-2 py-0.5 rounded font-black ml-2 shadow-sm tracking-wide">⚠️ VENCIDA</span>';
                } else if (estadoVencimiento === 'alerta') {
                    badgeVencimiento = '<span class="bg-yellow-100 text-yellow-800 border border-yellow-300 text-[10px] px-2 py-0.5 rounded font-black ml-2 shadow-sm tracking-wide">⏳ REVISAR</span>';
                }

                // Badge de estado independiente
                const badgeEstado = `<span class="text-[10px] font-bold uppercase bg-slate-100 border border-slate-200 px-2 py-1 rounded text-slate-500">${u.estado}</span>`;

                // Inyectamos la tarjeta en el HTML
                contU.innerHTML += `
                <div id="u-${u.id}" onclick="seleccionar('unidad', '${u.id}')" class="tarjeta-unidad cursor-pointer bg-white border-2 border-slate-200 p-3 rounded-lg flex justify-between items-center transition hover:border-indigo-400 group">
                    <div class="flex items-center">
                        <span class="font-bold text-slate-700 text-lg group-hover:text-indigo-700">${u.tractor}</span>
                        ${badgeVencimiento}
                    </div>
                    ${badgeEstado}
                </div>`;
            });

            // 2. Carga de Choferes (Se mantiene igual)
            const { data: chofs } = await db.from('choferes').select('id, nombre, estado').eq('estado', 'inactivo');
            const contC = document.getElementById('contenedor-choferes');
            contC.innerHTML = '';
            chofs?.forEach(c => {
                const badgeEstadoChofer = `<span class="text-[10px] font-bold uppercase bg-slate-100 border border-slate-200 px-2 py-1 rounded text-slate-500">${c.estado}</span>`;
                contC.innerHTML += `
                <div id="c-${c.id}" onclick="seleccionar('chofer', '${c.id}')" class="tarjeta-chofer cursor-pointer bg-white border-2 border-slate-200 p-3 rounded-lg flex justify-between items-center transition hover:border-indigo-400 group">
                    <span class="font-bold text-slate-700 text-lg group-hover:text-indigo-700">${c.nombre}</span>
                    ${badgeEstadoChofer}
                </div>`;
            });
        }

        function seleccionar(tipo, id) {
            document.querySelectorAll(`.tarjeta-${tipo}`).forEach(el => el.classList.remove('border-indigo-600', 'bg-indigo-50'));
            document.getElementById(`${tipo.charAt(0)}-${id}`).classList.add('border-indigo-600', 'bg-indigo-50');
            state[tipo] = id;
            document.getElementById('btn-inicia').disabled = !(state.unidad && state.chofer);
        }

        async function registrarSalida() {
            document.getElementById('btn-inicia').innerText = "Guardando...";
            await db.from('movimientos').insert([{ 
                tipo_operacion: 'inicia_diagrama', 
                id_unidad: state.unidad, 
                id_chofer: state.chofer 
            }]);
            location.reload(); 
        }

        cargarDatos();
    </script>
</body>
</html>
