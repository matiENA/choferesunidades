<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión en Ruta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-200 min-h-screen flex flex-col font-sans">
    
    <header class="bg-slate-900 text-white shadow-md z-20 flex flex-col md:flex-row items-center justify-between px-6 py-3 border-b-4 border-emerald-500 font-sans">
        <div class="w-full md:w-1/3 flex justify-center md:justify-start items-center mb-3 md:mb-0">
            <h1 class="text-xl font-black tracking-widest text-white uppercase">SISTEMA FLOTA</h1>
        </div>
        <div class="w-full md:w-1/3 flex justify-center mb-3 md:mb-0">
            <nav class="flex gap-2 bg-slate-800 p-1.5 rounded-lg shadow-inner">
                <a href="index.html" class="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center tracking-wider transition duration-200">INICIA</a>
                <a href="gestion-diagramas.html" class="px-4 py-2 bg-emerald-600 text-white text-sm font-bold rounded shadow-md flex items-center tracking-wider pointer-events-none transition duration-200">GESTIÓN</a>
                <a href="taller.html" class="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center tracking-wider transition duration-200">TALLER</a>
            </nav>
        </div>
        <div class="w-full md:w-1/3 flex justify-center md:justify-end items-center gap-4">
            <button onclick="cargarDiagramasActivos()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-xs font-bold transition duration-200 tracking-widest uppercase">Refrescar</button>
            <span id="status-indicator" class="text-xs font-bold text-slate-400 tracking-widest uppercase hidden md:inline">Verificando...</span>
            <button onclick="cerrarSesion()" class="text-xs font-bold bg-slate-800 hover:bg-rose-600 border border-slate-700 hover:border-rose-600 px-3 py-1.5 rounded text-slate-300 hover:text-white transition duration-200 uppercase tracking-widest">
                Cerrar Sesión
            </button>
        </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
        <div class="max-w-6xl mx-auto space-y-10">
            
            <section>
                <h2 class="text-sm font-black text-rose-700 mb-3 uppercase tracking-widest border-b-2 border-rose-200 pb-1">Falta Unidad / Reemplazo</h2>
                <div id="contenedor-falta" class="flex flex-col gap-3"></div>
            </section>

            <section>
                <h2 class="text-sm font-black text-orange-700 mb-3 uppercase tracking-widest border-b-2 border-orange-200 pb-1">Enviadas a Tránsito</h2>
                <div id="contenedor-transito" class="flex flex-col gap-3"></div>
            </section>

            <section>
                <h2 class="text-sm font-black text-blue-700 mb-3 uppercase tracking-widest border-b-2 border-blue-200 pb-1">En Circulación</h2>
                <div id="contenedor-circulando" class="flex flex-col gap-3"></div>
            </section>

        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div id="modal-box" class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 border-t-4">
            <h3 id="modal-title" class="text-xl font-black text-slate-800 tracking-wide mb-2 uppercase"></h3>
            <p id="modal-message" class="text-sm font-bold text-slate-500 mb-4"></p>
            <div id="modal-input-container" class="hidden mb-6">
                <input type="text" id="modal-input" class="w-full p-3 border border-slate-300 rounded bg-slate-50 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-sm font-medium text-slate-700">
            </div>
            <div class="flex justify-end gap-3">
                <button id="modal-btn-cancel" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded transition tracking-wider text-sm uppercase">Cancelar</button>
                <button id="modal-btn-confirm" class="px-6 py-2 text-white font-bold rounded shadow transition tracking-wider text-sm uppercase">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://laspqhmkrbmuxfgmnudf.supabase.co', 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d');
        let operadorActual = "";

        function showModal({ title, message, type = 'confirm', color = 'indigo', inputPlaceholder = '' }) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('modal-overlay');
                const box = document.getElementById('modal-box');
                const btnCancel = document.getElementById('modal-btn-cancel');
                const btnConfirm = document.getElementById('modal-btn-confirm');
                const inputCont = document.getElementById('modal-input-container');
                const inputEl = document.getElementById('modal-input');

                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-message').innerText = message;

                box.classList.remove('border-rose-500', 'border-orange-500', 'border-indigo-500');
                btnConfirm.classList.remove('bg-rose-600', 'hover:bg-rose-700', 'bg-orange-600', 'hover:bg-orange-700', 'bg-indigo-600', 'hover:bg-indigo-700');
                inputCont.classList.add('hidden');
                inputEl.value = '';

                if (color === 'rose') { box.classList.add('border-rose-500'); btnConfirm.classList.add('bg-rose-600', 'hover:bg-rose-700'); } 
                else if (color === 'orange') { box.classList.add('border-orange-500'); btnConfirm.classList.add('bg-orange-600', 'hover:bg-orange-700'); } 
                else { box.classList.add('border-indigo-500'); btnConfirm.classList.add('bg-indigo-600', 'hover:bg-indigo-700'); }

                if (type === 'alert') btnCancel.classList.add('hidden');
                else btnCancel.classList.remove('hidden');

                if (type === 'prompt') { inputCont.classList.remove('hidden'); inputEl.placeholder = inputPlaceholder; }

                overlay.classList.remove('hidden');
                setTimeout(() => { 
                    overlay.classList.remove('opacity-0'); 
                    box.classList.replace('scale-95', 'scale-100'); 
                    if(type === 'prompt') inputEl.focus();
                }, 10);

                const closeModal = (result) => {
                    overlay.classList.add('opacity-0'); box.classList.replace('scale-100', 'scale-95');
                    setTimeout(() => { overlay.classList.add('hidden'); resolve(result); }, 300);
                };

                btnConfirm.onclick = () => {
                    if (type === 'prompt') {
                        if (!inputEl.value.trim()) return inputEl.classList.add('border-rose-500', 'ring-2', 'ring-rose-200');
                        closeModal(inputEl.value.trim());
                    } else closeModal(true);
                };
                btnCancel.onclick = () => closeModal(false);
            });
        }

        async function verificarSesion() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) window.location.href = 'login.html';
            else {
                operadorActual = session.user.email;
                document.getElementById('status-indicator').innerText = operadorActual;
                cargarDiagramasActivos();
            }
        }

        async function cargarDiagramasActivos() {
            const { data: libres } = await db.from('units').select('id, tractor').eq('estado', 'disponible');
            let opcionesReemplazo = '<option value="">Seleccionar reemplazo...</option>';
            libres?.forEach(u => opcionesReemplazo += `<option value="${u.id}">${u.tractor}</option>`);

            const { data: activos } = await db.from('movimientos')
                .select('id, fecha_inicio, eventos_intermedios, id_chofer, id_unidad, units(tractor, estado), choferes(nombre)')
                .eq('estado_diagrama', 'abierto')
                .order('fecha_inicio', { ascending: false });

            let htmlFalta = '';
            let htmlTransito = '';
            let htmlCirculando = '';

            activos?.forEach(mov => {
                const estado = mov.units?.estado;
                const jsonStr = encodeURIComponent(JSON.stringify({ 
                    id: mov.id, id_unidad_vieja: mov.id_unidad, id_chofer: mov.id_chofer, evts: mov.eventos_intermedios || [] 
                }));

                // DISEÑO BASE DE CARD HORIZONTAL
                let cardBase = `
                    <div class="flex items-center gap-4 mb-1">
                        <h3 class="text-xl font-black text-slate-800 uppercase">${mov.units?.tractor}</h3>
                        <span class="text-sm font-bold text-slate-600 uppercase">${mov.choferes?.nombre}</span>
                    </div>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Inicio: ${new Date(mov.fecha_inicio).toLocaleString()}</p>
                `;

                if (estado === 'circulando') {
                    htmlCirculando += `
                        <div class="bg-white border border-slate-200 rounded p-4 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-l-4 border-blue-500">
                            <div class="flex-1">${cardBase}</div>
                            <div class="flex gap-2 w-full md:w-auto shrink-0">
                                <button onclick="marcarTransito('${jsonStr}')" class="flex-1 md:flex-none bg-orange-50 hover:bg-orange-100 text-orange-700 font-bold py-2 px-4 rounded border border-orange-200 transition text-[10px] uppercase tracking-wide">Reportar Tránsito</button>
                                <button onclick="terminar('${mov.id}')" class="flex-1 md:flex-none bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 px-4 rounded shadow transition text-[10px] uppercase tracking-wide">Terminar</button>
                            </div>
                        </div>`;
                } 
                else if (estado === 'reparacion en transito') {
                    htmlTransito += `
                        <div class="bg-white border border-slate-200 rounded p-4 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-l-4 border-orange-500">
                            <div class="flex-1">${cardBase}</div>
                            <div class="flex w-full md:w-auto shrink-0 justify-end">
                                <button onclick="deshacerTransito('${jsonStr}')" class="text-orange-500 hover:text-orange-700 text-xs font-bold transition uppercase">Deshacer Envío</button>
                            </div>
                        </div>`;
                } 
                else if (estado === 'reparacion') {
                    htmlFalta += `
                        <div class="bg-white border border-slate-200 rounded p-4 shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-l-4 border-rose-500">
                            <div class="flex-1">${cardBase}</div>
                            <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto shrink-0 items-stretch sm:items-center">
                                <select id="reemplazo-${mov.id}" class="p-2 border border-slate-300 rounded text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-400 w-full sm:w-48">
                                    ${opcionesReemplazo}
                                </select>
                                <button onclick="asignarReemplazo('${jsonStr}')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded shadow transition text-[10px] uppercase tracking-wide">Asignar Unidad</button>
                            </div>
                        </div>`;
                }
            });

            // Si las secciones están vacías, mostrar mensaje sutil
            document.getElementById('contenedor-falta').innerHTML = htmlFalta || '<p class="text-xs font-bold text-slate-400">Sin registros.</p>';
            document.getElementById('contenedor-transito').innerHTML = htmlTransito || '<p class="text-xs font-bold text-slate-400">Sin registros.</p>';
            document.getElementById('contenedor-circulando').innerHTML = htmlCirculando || '<p class="text-xs font-bold text-slate-400">Sin registros.</p>';
        }

        async function asignarReemplazo(jsonStr) {
            const data = JSON.parse(decodeURIComponent(jsonStr));
            const nuevaUnidadId = document.getElementById(`reemplazo-${data.id}`).value;
            
            if(!nuevaUnidadId) return showModal({title: 'Asignación requerida', message: 'Debe seleccionar un tractor de reemplazo.', type: 'alert', color: 'rose'});

            const evts = [...data.evts, { evento: "Reasignación", operador: operadorActual, fecha: new Date().toISOString() }];

            await db.from('units').update({ estado: 'circulando', fecha_cambio_estado: new Date().toISOString() }).eq('id', nuevaUnidadId);
            await db.from('movimientos').update({ id_unidad: nuevaUnidadId, eventos_intermedios: evts }).eq('id', data.id);
            cargarDiagramasActivos();
        }

        async function terminar(id_mov) {
            const confirmed = await showModal({ title: 'Terminar Diagrama', message: '¿Confirmar cierre del diagrama operativo?', color: 'rose' });
            if(!confirmed) return;
            await db.from('movimientos').update({ fecha_fin: new Date().toISOString(), estado_diagrama: 'cerrado' }).eq('id', id_mov);
            cargarDiagramasActivos();
        }

        async function marcarTransito(jsonStr) {
            const motivo = await showModal({ title: 'Enviar a Tránsito', message: 'Especifique la contingencia.', type: 'prompt', color: 'orange', inputPlaceholder: 'Motivo de tránsito' });
            if(!motivo) return; 
            
            const data = JSON.parse(decodeURIComponent(jsonStr));
            const evts = [...data.evts, { evento: "Tránsito", motivo: motivo, operador: operadorActual, fecha: new Date().toISOString() }];
            
            await db.from('movimientos').update({ eventos_intermedios: evts }).eq('id', data.id);
            await db.from('units').update({ estado: 'reparacion en transito', fecha_cambio_estado: new Date().toISOString() }).eq('id', data.id_unidad_vieja);
            cargarDiagramasActivos();
        }

        async function deshacerTransito(jsonStr) {
            const confirmed = await showModal({ title: 'Anular Envío', message: 'La unidad regresará a estado circulante.', color: 'orange' });
            if(!confirmed) return;

            const data = JSON.parse(decodeURIComponent(jsonStr));
            let evts = data.evts;
            if (evts.length > 0 && evts[evts.length - 1].evento === 'Tránsito') evts.pop(); 

            await db.from('movimientos').update({ eventos_intermedios: evts }).eq('id', data.id);
            await db.from('units').update({ estado: 'circulando', fecha_cambio_estado: new Date().toISOString() }).eq('id', data.id_unidad_vieja);
            cargarDiagramasActivos();
        }

        function toggleUserMenu() { document.getElementById('user-dropdown').classList.toggle('hidden'); }
        async function cerrarSesion() { await db.auth.signOut(); window.location.href = 'login.html'; }
        
        document.addEventListener('click', (event) => {
            const btn = document.getElementById('btn-user');
            const dropdown = document.getElementById('user-dropdown');
            if (btn && dropdown && !btn.contains(event.target) && !dropdown.contains(event.target)) dropdown.classList.add('hidden');
        });

        verificarSesion();

        
    </script>
</body>
</html>
