<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Diagramas | En Ruta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-200 min-h-screen flex flex-col font-sans">

    <header class="bg-slate-900 text-white shadow-md z-10 flex flex-col md:flex-row justify-between items-center px-6 py-3 border-b-4 border-emerald-500">
        <div class="flex items-center gap-4 mb-3 md:mb-0">
            <h1 class="text-xl font-black tracking-widest text-white">SISTEMA FLOTA</h1>
        </div>

        <nav class="flex gap-2 bg-slate-800 p-1.5 rounded-lg shadow-inner">
            <a href="Index.html" class="px-5 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center gap-2 transition">
                🚀 Operaciones
            </a>
            <a href="gestion-diagramas.html" class="px-5 py-2 bg-emerald-600 text-white text-sm font-bold rounded shadow-sm flex items-center gap-2 pointer-events-none">
                🛣️ Gestión en Ruta
            </a>
            <a href="flota-activa.html" class="px-5 py-2 text-slate-400 hover:text-white hover:bg-slate-700 text-sm font-bold rounded flex items-center gap-2 transition">
                📊 Monitor
            </a>
        </nav>

        <div class="mt-3 md:mt-0 flex items-center gap-3">
            <button onclick="cargarDiagramasActivos()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-sm font-bold transition">
                🔄 Refrescar
            </button>
            <span id="status-indicator" class="text-sm font-bold bg-slate-800 px-3 py-1.5 rounded text-slate-300">Conectando...</span>
        </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 tracking-wide">DIAGRAMAS ABIERTOS</h2>
                    <p class="text-slate-500 font-medium">Equipos actualmente en ruta o en tránsito.</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-lg shadow border border-slate-200">
                    <span class="text-sm font-bold text-slate-500 uppercase">Total Activos:</span>
                    <span class="text-xl font-black text-emerald-600 ml-2" id="contador-activos">0</span>
                </div>
            </div>

            <div id="contenedor-diagramas" class="flex flex-col gap-4">
                </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://laspqhmkrbmuxfgmnudf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_HowwuqG31WUNjO6vAjxZmQ_yRSzV-0d';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function formatearFecha(fechaIso) {
            if (!fechaIso) return '-';
            const f = new Date(fechaIso);
            return f.toLocaleString('es-AR', { day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit' });
        }

        // Calcula cuánto tiempo pasó desde que inició el diagrama
        function calcularTiempoTranscurrido(fechaInicioISO) {
            const inicio = new Date(fechaInicioISO);
            const ahora = new Date();
            const diffMs = ahora - inicio;
            const diffDias = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const diffHoras = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
            
            if (diffDias > 0) return `${diffDias}d ${diffHoras}h en ruta`;
            return `${diffHoras} horas en ruta`;
        }

        async function cargarDiagramasActivos() {
            const indicador = document.getElementById('status-indicator');
            indicador.innerText = 'Buscando...';
            indicador.className = 'text-sm font-bold bg-amber-500 px-3 py-1.5 rounded text-white';

            // Buscamos solo los movimientos donde el estado del diagrama sea ABIERTO
            const { data: diagramas, error } = await db
                .from('movimientos')
                .select(`
                    id, 
                    fecha_inicio, 
                    estado_diagrama, 
                    eventos_intermedios,
                    id_chofer,
                    id_unidad,
                    units ( tractor, estado ),
                    choferes ( nombre, estado )
                `)
                .eq('estado_diagrama', 'abierto')
                .order('fecha_inicio', { ascending: false });

            if (error) {
                console.error(error);
                indicador.innerText = 'Error';
                indicador.classList.replace('bg-amber-500', 'bg-red-600');
                return;
            }

            const contenedor = document.getElementById('contenedor-diagramas');
            contenedor.innerHTML = '';
            document.getElementById('contador-activos').innerText = diagramas.length;

            if (diagramas.length === 0) {
                contenedor.innerHTML = `
                    <div class="bg-white p-8 rounded-xl shadow border border-slate-200 text-center">
                        <p class="text-slate-500 font-bold text-lg">No hay diagramas abiertos en este momento.</p>
                    </div>`;
            } else {
                diagramas.forEach(diag => {
                    const eventos = diag.eventos_intermedios || [];
                    const ultimaNovedad = eventos.length > 0 ? eventos[eventos.length - 1].evento : 'En viaje normal';
                    
                    const btnJson = encodeURIComponent(JSON.stringify({
                        id_movimiento: diag.id,
                        id_unidad: diag.id_unidad,
                        id_chofer: diag.id_chofer,
                        eventos_actuales: eventos
                    }));

                    contenedor.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-xl shadow-sm hover:shadow-md transition p-5 flex flex-col lg:flex-row gap-6 items-start lg:items-center justify-between group relative overflow-hidden">
                            <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-emerald-500"></div>
                            
                            <div class="flex flex-col gap-1 min-w-[250px] pl-2">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Unidad Asignada</span>
                                <div class="flex items-center gap-2">
                                    <h3 class="text-2xl font-black text-slate-800">${diag.units?.tractor || 'S/D'}</h3>
                                    <span class="text-xs bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-600 font-bold uppercase">${diag.units?.estado || ''}</span>
                                </div>
                                <p class="text-sm font-bold text-slate-600 mt-2 flex items-center gap-1">
                                    🧑‍✈️ ${diag.choferes?.nombre || 'S/D'}
                                </p>
                            </div>

                            <div class="flex-1 w-full bg-slate-50 p-3 rounded-lg border border-slate-100 flex flex-col sm:flex-row justify-between gap-4">
                                <div>
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Inicio de Diagrama</span>
                                    <p class="text-sm font-bold text-slate-800">🟢 ${formatearFecha(diag.fecha_inicio)}</p>
                                    <p class="text-xs font-semibold text-emerald-600 mt-1">⏳ ${calcularTiempoTranscurrido(diag.fecha_inicio)}</p>
                                </div>
                                
                                <div class="sm:text-right">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Última Novedad</span>
                                    <span class="text-xs font-bold px-2 py-1 rounded bg-orange-100 text-orange-800 border border-orange-200 uppercase">
                                        ${ultimaNovedad}
                                    </span>
                                </div>
                            </div>

                            <div class="flex flex-col sm:flex-row gap-2 w-full lg:w-auto mt-2 lg:mt-0">
                                <button onclick="marcarTransito('${btnJson}')" class="bg-orange-100 hover:bg-orange-200 text-orange-800 border border-orange-300 font-bold py-2 px-4 rounded transition text-sm flex-1 lg:flex-none text-center">
                                    🟠 Tránsito
                                </button>
                                <button onclick="terminarDiagrama('${btnJson}')" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 px-4 rounded shadow transition text-sm flex-1 lg:flex-none text-center">
                                    🔴 TERMINAR
                                </button>
                            </div>
                        </div>
                    `;
                });
            }

            indicador.innerText = 'Actualizado';
            indicador.className = 'text-sm font-bold bg-emerald-600 px-3 py-1.5 rounded text-white';
        }

        // LÓGICA DE ACTUALIZACIÓN EN BASE DE DATOS

async function terminarDiagrama(jsonStr) {
            if(!confirm("¿Estás seguro de cerrar este diagrama y pasar al chofer a franco?")) return;
            
            const data = JSON.parse(decodeURIComponent(jsonStr));
            document.getElementById('status-indicator').innerText = 'Guardando...';

            // ATENCIÓN: Solo enviamos la actualización del Movimiento.
            // El Trigger en PostgreSQL (Backend) se encargará de liberar la unidad y al chofer.
            await db.from('movimientos')
                .update({ 
                    fecha_fin: new Date().toISOString(), 
                    estado_diagrama: 'cerrado' 
                })
                .eq('id', data.id_movimiento);

            cargarDiagramasActivos();
        }

        async function marcarTransito(jsonStr) {
            const motivo = prompt("Ingresá el motivo del tránsito (ej: Rotura, Taller, Mantenimiento):");
            if(!motivo) return;

            const data = JSON.parse(decodeURIComponent(jsonStr));
            document.getElementById('status-indicator').innerText = 'Guardando...';

            // Preparamos el evento
            const nuevoEvento = {
                evento: "Tránsito",
                motivo: motivo,
                fecha: new Date().toISOString()
            };
            const eventosActualizados = [...data.eventos_actuales, nuevoEvento];

            // ATENCIÓN: Solo inyectamos el JSON.
            // El Trigger en PostgreSQL lo leerá y pondrá el tractor en "reparación en tránsito".
            await db.from('movimientos')
                .update({ eventos_intermedios: eventosActualizados })
                .eq('id', data.id_movimiento);

            cargarDiagramasActivos();
        }
        cargarDiagramasActivos();
        setInterval(cargarDiagramasActivos, 30000); // Auto-refresh cada 30 seg
    </script>
</body>
</html>
